<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerBill Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Auth Page -->
    <div id="auth-page" class="auth-container">
        <div class="auth-card">
            <h1 style="text-align: center; margin-bottom: 2rem;">Admin Login</h1>
            <div id="login-error" style="color: var(--danger); margin-bottom: 1rem; display: none;">Invalid credentials
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin">
            </div>
            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Password</label>
                <input type="password" id="password" value="admin123">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 2rem;" onclick="auth.login()">Login</button>
        </div>
    </div>

    <!-- Main App Layout (Hidden initially) -->
    <div id="app-layout" style="display: none; width: 100%; height: 100%;">
        <aside class="sidebar">
            <div class="logo">⚡ PowerBill Pro</div>
            <ul class="nav-links">
                <li class="nav-item active" onclick="router.navigate('dashboard')">Dashboard</li>
                <li class="nav-item" onclick="router.navigate('products')">Products</li>
                <li class="nav-item" onclick="router.navigate('customers')">Customers</li>
                <li class="nav-item" onclick="router.navigate('billing')">New Bill</li>
                <li class="nav-item" onclick="router.navigate('warranty')">Warranty</li>
                <li class="nav-item" onclick="router.navigate('reports')">Reports</li>
                <li class="nav-item" onclick="router.navigate('settings')">Settings</li>
                <li class="nav-item" style="margin-top: auto;" onclick="auth.logout()">Logout</li>
            </ul>
        </aside>

        <main class="main-content" id="view-container">
            <!-- Dynamic Content Injected Here -->
        </main>
    </div>

    <!-- Toast Component -->
    <div id="toast"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Saving Bill, please wait...</p>
    </div>

    <!-- Generic Modal Component -->

    <!-- Generic Modal Component -->
    <div id="generic-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Confirm</h2>
            <div id="modal-body" style="margin-top: 1rem;"></div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <button id="modal-cancel-btn" class="btn" style="background: #e2e8f0;">Cancel</button>
                <button id="modal-confirm-btn" class="btn btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="modules/auth.js"></script>
    <script src="modules/products.js"></script>
    <script src="modules/customers.js"></script>
    <script src="modules/billing.js"></script>
    <script src="modules/warranty.js"></script>
    <script src="modules/reports.js"></script>
    <script src="modules/settings.js"></script>
    <script src="renderer.js"></script>
</body>

</html>
